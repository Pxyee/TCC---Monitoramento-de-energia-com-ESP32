<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="assets/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voltsense - Dashboard</title>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="dashboard.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <button class="toggle-btn" id="toggleBtn">
      <i class="fas fa-chevron-left"></i>
    </button>

    <div class="sidebar-header">
      <img src="assets/logo voltsense.png" class="sidebar-logo">
      <h2 class="sidebar-title">Voltsense</h2>
    </div>

    <nav class="sidebar-nav">
      <ul class="nav-list">

        <li class="nav-item">
          <button class="nav-link user-btn">
            <i class="fas fa-user-circle"></i>
            <span class="nav-text" id="nomeUsuario">Usuário</span>
          </button>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button class="footer-btn logout-btn">
        <i class="fas fa-sign-out-alt"></i>
        <span class="nav-text">Sair</span>
      </button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- CARDS -->
    <div class="cards">

      <div class="card">
        <h2>Tensão</h2>
        <p id="tensao">220 V</p>
      </div>

      <div class="card">
        <h2>Corrente</h2>
        <p id="corrente">12 A</p>
      </div>

      <div class="card">
        <h2>Consumo</h2>
        <p id="consumo">2.4 kWh</p>
      </div>

      <div class="card">
        <h2>Última atualização</h2>
        <p id="atualizacao">18:42</p>
      </div>

    </div>

  <!-- GRÁFICOS -->
<div class="graficos-container">

  <!-- GRÁFICO DO DIA -->
  <div class="chart-box">
    <h2>Consumo ao longo do dia</h2>
    <canvas id="graficoConsumo"></canvas>
  </div>

  <!-- ACUMULADO DO MÊS -->
  <div class="chart-box">
    <h2>Acumulado do mês</h2>
    <canvas id="graficoMes"></canvas>
  </div>

</div>

    <!-- RESUMO DA SEMANA -->
    <div class="resumo-semana">

      <div class="resumo-header">
        <h2>Resumo da Semana</h2>

        <div class="filtro-semana">
          <label>Semana</label>
          <input type="week" id="filtroSemana">
        </div>
      </div>

      <div class="resumo-cards">

        <div class="resumo-card">
          <h3>Total</h3>
          <p id="totalSemana">0 kWh</p>
        </div>

        <div class="resumo-card">
          <h3>Média diária</h3>
          <p id="mediaSemana">0 kWh</p>
        </div>

        <div class="resumo-card">
          <h3>Maior consumo</h3>
          <p id="maxSemana">-</p>
        </div>

        <div class="resumo-card">
          <h3>Menor consumo</h3>
          <p id="minSemana">-</p>
        </div>

      </div>

    </div>

  </main>

  <script src="dashboard.js"></script>

</body>
</html>
