<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voltsense - Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <img src="/assets/logo voltsense.png" alt="Logo Voltsense" class="logo" />

    <h1 class="audiowide-regular">Voltsense</h1>
    <p>Login do Sistema</p>

    <form id="loginForm">
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required />
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required />
      </div>

      <button type="submit">Entrar</button>
    </form>

    <div id="mensagem"></div>

    <div class="footer">
      Não possui conta? <a href="cadastro.html">Criar cadastro</a>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
